spring:
  datasource:
    url: jdbc:postgresql://localhost:5443/hotel_booking
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:liquibase/changelog/db.changelog-master.xml

server:
  port: 8081


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html


