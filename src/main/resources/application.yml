spring:
  datasource:
    url: jdbc:postgresql://localhost:5443/hotel_booking
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: true
    change-log: classpath:liquibase/changelog/db.changelog-master.xml

logging:
  level:
    org.springframework.jdbc.core: DEBUG
    liquibase: DEBUG
    com.hotel: DEBUG